<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06080f"/>
      <stop offset="30%" style="stop-color:#0a1628"/>
      <stop offset="70%" style="stop-color:#12102a"/>
      <stop offset="100%" style="stop-color:#06080f"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8833a"/>
      <stop offset="35%" style="stop-color:#f5a623"/>
      <stop offset="65%" style="stop-color:#f5d78e"/>
      <stop offset="100%" style="stop-color:#e8833a"/>
    </linearGradient>
    <linearGradient id="subtitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="50%" style="stop-color:#88d8d0"/>
      <stop offset="100%" style="stop-color:#4ecdc4"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8833a00"/>
      <stop offset="20%" style="stop-color:#e8833a"/>
      <stop offset="80%" style="stop-color:#e8833a"/>
      <stop offset="100%" style="stop-color:#e8833a00"/>
    </linearGradient>
    <linearGradient id="lineGradCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ecdc400"/>
      <stop offset="20%" style="stop-color:#4ecdc4"/>
      <stop offset="80%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#4ecdc400"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="forgeGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bgGrad)"/>

  <!-- Star field -->
  <circle cx="45" cy="23" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="120" cy="67" r="0.7" fill="#ffffff" opacity="0.5"/>
  <circle cx="200" cy="15" r="1.2" fill="#f5a623" opacity="0.4"/>
  <circle cx="310" cy="45" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="380" cy="80" r="0.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="450" cy="20" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="520" cy="55" r="0.6" fill="#4ecdc4" opacity="0.5"/>
  <circle cx="600" cy="30" r="1.1" fill="#ffffff" opacity="0.7"/>
  <circle cx="680" cy="65" r="0.7" fill="#ffffff" opacity="0.5"/>
  <circle cx="750" cy="18" r="0.9" fill="#ffffff" opacity="0.8"/>
  <circle cx="830" cy="42" r="0.6" fill="#f5a623" opacity="0.3"/>
  <circle cx="870" cy="75" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="70" cy="250" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="155" cy="270" r="0.6" fill="#ffffff" opacity="0.4"/>
  <circle cx="260" cy="245" r="1" fill="#4ecdc4" opacity="0.4"/>
  <circle cx="350" cy="280" r="0.7" fill="#ffffff" opacity="0.6"/>
  <circle cx="480" cy="260" r="0.9" fill="#ffffff" opacity="0.5"/>
  <circle cx="570" cy="275" r="0.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="660" cy="250" r="1.1" fill="#ffffff" opacity="0.7"/>
  <circle cx="740" cy="270" r="0.6" fill="#f5a623" opacity="0.4"/>
  <circle cx="820" cy="255" r="0.8" fill="#ffffff" opacity="0.6"/>
  <circle cx="95" cy="140" r="0.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="805" cy="150" r="0.7" fill="#ffffff" opacity="0.4"/>
  <circle cx="30" cy="180" r="0.6" fill="#4ecdc4" opacity="0.3"/>
  <circle cx="870" cy="190" r="0.5" fill="#ffffff" opacity="0.3"/>

  <!-- Forge nebula glow behind title -->
  <ellipse cx="450" cy="125" rx="280" ry="90" fill="#e8833a" opacity="0.04"/>
  <ellipse cx="450" cy="125" rx="200" ry="60" fill="#f5a623" opacity="0.05"/>
  <ellipse cx="450" cy="125" rx="120" ry="35" fill="#f5d78e" opacity="0.03"/>

  <!-- Decorative lines -->
  <rect x="80" y="88" width="740" height="1" fill="url(#lineGrad)" opacity="0.2"/>
  <rect x="120" y="172" width="660" height="1" fill="url(#lineGradCyan)" opacity="0.2"/>

  <!-- Corner brackets (top-left) -->
  <path d="M 50,55 L 50,40 L 65,40" fill="none" stroke="#e8833a" stroke-width="1.5" opacity="0.5"/>
  <!-- Corner brackets (top-right) -->
  <path d="M 850,55 L 850,40 L 835,40" fill="none" stroke="#e8833a" stroke-width="1.5" opacity="0.5"/>
  <!-- Corner brackets (bottom-left) -->
  <path d="M 50,245 L 50,260 L 65,260" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.4"/>
  <!-- Corner brackets (bottom-right) -->
  <path d="M 850,245 L 850,260 L 835,260" fill="none" stroke="#4ecdc4" stroke-width="1.5" opacity="0.4"/>

  <!-- Main title: NOVA FORGE -->
  <text x="450" y="105" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="300" letter-spacing="14" fill="#f5a623" opacity="0.6">N O V A</text>
  <text x="450" y="148" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="60" font-weight="700" letter-spacing="18" fill="url(#titleGrad)" filter="url(#glow)">FORGE</text>

  <!-- Subtitle -->
  <text x="450" y="195" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" letter-spacing="6" fill="url(#subtitleGrad)" opacity="0.8">PVE SPACE SIMULATOR</text>

  <!-- Bottom tagline -->
  <text x="450" y="225" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" letter-spacing="2" fill="#5a7a8a" opacity="0.7">C++ / OpenGL · Atlas Engine · Solo &amp; Co-op · Procedural Universe</text>

  <!-- Status badge -->
  <rect x="355" y="240" width="190" height="22" rx="11" fill="#e8833a" fill-opacity="0.08" stroke="#e8833a" stroke-width="0.5" opacity="0.4"/>
  <text x="450" y="255" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" letter-spacing="3" fill="#f5a623" opacity="0.6">ACTIVE R&amp;D</text>

  <!-- Thin border -->
  <rect x="1" y="1" width="898" height="298" rx="4" fill="none" stroke="#e8833a" stroke-width="0.5" opacity="0.12"/>
</svg>
